# 600-step RL training: Qwen 4B vs abyssal heuristic opponent.
# 6-node 3+3 split: Nodes 1-3 = inference (DP=4 each, DP=12 total),
#                    Nodes 4-6 = trainer (4 GPUs each, 12 GPUs FSDP total) + orchestrator + Showdown on Node 4.
# Total batch_size=64 per step. max_tokens=4096, seq_len=8192.
#
# Launch: sbatch local_scripts/launch_6node.sh
# NOTE: __INFER_N__ placeholders replaced at launch time with actual hostnames.
max_steps = 600
seq_len = 8192

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[wandb]
project = "pokemon-rl"
name = "vs-abyssal-gen9ou-6node-4k"

[orchestrator]
batch_size = 64
rollouts_per_example = 64    # = batch_size: batch-level GRPO normalization
trajectory_strategy = "branching"

[orchestrator.client]
# 3 inference nodes (DP=4 each = DP=12 total).
# __INFER_N__ replaced at launch time.
base_url = ["http://__INFER_1__:8001/v1", "http://__INFER_2__:8001/v1", "http://__INFER_3__:8001/v1"]

[orchestrator.sampling]
max_tokens = 4096
temperature = 1.0

[[orchestrator.env]]
id = "pokemon_rl"
name = "pokemon-vs-abyssal-600"

[orchestrator.env.args]
battle_format = "gen9ou"
play_mode = "single"
opponent_type = "abyssal"
port = 8000
observation_format = "full_obs_cot"
reward_win = 1.0
reward_loss = 0.0
reward_draw = 0.0           # Deliberate: draws = losses. Do not change without discussion.
max_game_turns = 200
num_battles = 10000
team_dir = "vendor/pokechamp/poke_env/data/static/teams/gen9ou"
max_concurrent_battles = 64

[trainer.model]
attn = "flash_attention_2"

[trainer.model.ac]
freq = 1   # Gradient checkpointing — prevents OOM

[trainer.optim]
lr = 3e-6
betas1 = 0.9
betas2 = 0.9

[ckpt]
interval = 25

# No [inference] section — all inference on external nodes.
# Trainer uses 12 GPUs across 3 nodes (FSDP12).
