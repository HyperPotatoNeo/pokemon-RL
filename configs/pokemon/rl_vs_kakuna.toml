# RL training against Kakuna (metamon's best RL agent).
# Requires Kakuna process(es) running on the same Showdown server.
# launch_rl.sh auto-starts batch_size Kakuna instances.
max_steps = 100
seq_len = 4096

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[wandb]
project = "pokemon-rl"
name = "vs-kakuna-gen9ou"

[orchestrator]
batch_size = 16              # 16 games per step — needs 16 Kakuna instances
rollouts_per_example = 16    # = batch_size: batch-level normalization
trajectory_strategy = "branching"

[orchestrator.client]
base_url = ["http://localhost:8001/v1"]

[orchestrator.sampling]
max_tokens = 800
temperature = 1.0

[[orchestrator.env]]
id = "pokemon_rl"
name = "pokemon-vs-kakuna"

[orchestrator.env.args]
battle_format = "gen9ou"
play_mode = "single"
opponent_type = "kakuna"
port = 8000
observation_format = "pokechamp_io"
reward_win = 1.0
reward_loss = 0.0
reward_draw = 0.0           # Deliberate: draws = losses. Do not change without discussion.
max_game_turns = 100
num_battles = 10000
team_dir = "vendor/pokechamp/poke_env/data/static/teams/gen9ou"

[trainer.model.ac]
freq = 1

[trainer.optim]
lr = 3e-6
betas1 = 0.9
betas2 = 0.9

[ckpt]
interval = 10

[inference]

[inference.server]
port = 8001
